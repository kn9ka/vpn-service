services:
  3xui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    restart: unless-stopped
    network_mode: host
    volumes:
      - 3xui-db:/etc/x-ui/
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:2053/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      3xui:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  3xui-db:
